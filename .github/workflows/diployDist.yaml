name: Diploy Dist
on:
    - push
    - workflow_dispatch
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v4

            - name: install node 20
              uses: actions/setup-node@v4
              with:
                node-version: 20
            - name: print the version
              run: node -v
            - name: install dependancies
              run: npm clean install 

        
